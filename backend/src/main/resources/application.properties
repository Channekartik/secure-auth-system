# ============================================
# Application Config
# ============================================
spring.application.name=secure-auth-backend
server.port=8080

# ============================================
# MySQL DataSource
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/secure_auth_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
# Generate a strong 256-bit Base64 secret:
#   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
jwt.secret=bXlTZWN1cmVTZWNyZXRLZXlGb3JKV1RBdXRoU3lzdGVtMTIzNDU2Nzg=
jwt.expiration=86400000
# 86400000 ms = 24 hours

# ============================================
# Logging
# ============================================
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=INFO